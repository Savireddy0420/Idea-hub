<!-- HEADER -->
<div class="header" *ngIf="auth.isLoggedIn()">

  <div class="left">
    <h2>💡 Idea Hub</h2>
  </div>

  <div class="right">
    <span class="user">
      👤 {{ auth.getUser()?.name }} ({{ auth.getUser()?.role }})
    </span>
    <button (click)="logout()">Logout</button>
  </div>

</div>

<!-- LOGIN -->
<app-login *ngIf="!auth.isLoggedIn()"></app-login>

<!-- MAIN -->
<div class="main-container" *ngIf="auth.isLoggedIn()">
  <app-idea-list></app-idea-list>
</div>
