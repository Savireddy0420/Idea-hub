<div 
  class="h-screen flex items-center justify-start pl-24 bg-cover bg-center"
  style="background-image: url('https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvdjU5MS1teW50LTMzLWhhbmRkcmF3bmxpZ2h0YnVsYnNfMS5qcGc.jpg');">

  <!-- LOGIN CARD -->
  <div class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-xl w-80">

    <h1 class="text-2xl font-bold mb-1">💡 Idea Hub</h1>
    <p class="text-gray-500 mb-4">Welcome to Idea Hub</p>

    <input 
      type="text" 
      [(ngModel)]="name"
      placeholder="Enter your name"
      class="w-full p-2 mb-3 border rounded-lg focus:ring-2 focus:ring-blue-400"
    />

    <select 
      [(ngModel)]="role"
      class="w-full p-2 mb-4 border rounded-lg">
      <option value="employee">Employee</option>
      <option value="admin">Admin</option>
    </select>

    <button 
      (click)="login()"
      class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
      Login
    </button>

  </div>

</div>
