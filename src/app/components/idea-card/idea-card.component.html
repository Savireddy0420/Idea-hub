<div 
  [ngClass]="getCategoryColor(idea.category)"
  class="rounded-2xl shadow-md hover:shadow-xl transition duration-300 p-5 border">

  <!-- HEADER -->
  <div class="flex justify-between items-start mb-3">

    <div class="flex items-center gap-2">

      <!-- CATEGORY -->
      <span class="text-xs bg-white text-gray-800 px-2 py-1 rounded-full font-medium shadow-sm">
        {{ idea.category }}
      </span>

      <!-- NEW BADGE -->
      <span *ngIf="idea.isNew"
            class="flex items-center gap-1 bg-white text-green-700 px-2 py-1 rounded-full text-xs font-semibold shadow-sm">

        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        NEW
      </span>

    </div>

    <!-- DELETE -->
    <button *ngIf="canDelete()" (click)="delete()"
            class="text-white/70 hover:text-red-300 transition">
      🗑️
    </button>

  </div>

  <!-- TITLE -->
  <h3 class="font-semibold text-white text-lg mb-1">
    {{ idea.title }}
  </h3>

  <!-- DESCRIPTION -->
  <p class="text-sm text-white/80 line-clamp-2">
    {{ idea.description }}
  </p>

  <!-- AUTHOR -->
  <div class="flex items-center gap-2 mt-4">

    <div class="w-9 h-9 rounded-full text-white flex items-center justify-center text-sm font-semibold"
         [ngClass]="getAvatarColor(idea.author)">
      {{ idea.author.charAt(0).toUpperCase() || '?' }}
    </div>

    <span class="text-sm text-white font-medium">
      {{ idea.author }}
    </span>

  </div>

  <!-- ACTIONS -->
  <div class="flex justify-between items-center mt-4 text-sm">

    <div class="flex gap-4">

      <button (click)="like()"
              class="flex items-center gap-1 text-white/80 hover:text-red-300 transition">
        ❤️ <span>{{ idea.likes }}</span>
      </button>

      <button (click)="showComments = !showComments"
              class="flex items-center gap-1 text-white/80 hover:text-blue-300 transition">
        💬 <span>{{ idea.comments.length }}</span>
      </button>

    </div>

  </div>

  <!-- COMMENTS -->
  <div *ngIf="showComments" class="mt-4 border-t border-white/20 pt-3">

    <div *ngFor="let c of idea.comments"
         class="text-sm text-white/80 mb-1">
      {{ c }}
    </div>

    <div class="flex gap-2 mt-2">

      <input
        [(ngModel)]="newComment"
        placeholder="Add comment..."
        class="flex-1 p-2 rounded-lg text-sm bg-white/20 text-white placeholder-white/70 focus:ring-2 focus:ring-white" />

      <button
        (click)="addComment()"
        class="bg-white text-gray-800 px-3 rounded-lg text-sm font-medium hover:bg-gray-200 transition">
        Post
      </button>

    </div>

  </div>

</div>
